---
# Preview Manager Backend API Setup

- name: Install Python dependencies
  apt:
    name:
      - python3
      - python3-pip
      - python3-venv
    state: present
    update_cache: yes

- name: Create preview-manager directory
  file:
    path: /home/capy/www/previews/preview-manager
    state: directory
    owner: capy
    group: capy
    mode: '0755'

- name: Install Python packages
  pip:
    requirements: /home/capy/www/previews/preview-manager/requirements.txt
    executable: pip3
  become_user: capy

- name: Create .env file from template
  template:
    src: env.j2
    dest: /home/capy/www/previews/preview-manager/.env
    owner: capy
    group: capy
    mode: '0600'

- name: Create systemd service file
  template:
    src: preview-manager.service.j2
    dest: /etc/systemd/system/preview-manager.service
    owner: root
    group: root
    mode: '0644'
  notify:
    - Reload systemd
    - Restart preview-manager

- name: Enable and start preview-manager service
  systemd:
    name: preview-manager
    enabled: yes
    state: started
    daemon_reload: yes

- name: Create Traefik configuration for API
  template:
    src: traefik-api.yaml.j2
    dest: /home/capy/.ddev/traefik/config/preview-manager-api.yaml
    owner: capy
    group: capy
    mode: '0644'
  notify: Restart ddev-router

- name: Ensure API domain resolves locally
  lineinfile:
    path: /etc/hosts
    line: "127.0.0.1 api.{{ domain }}"
    state: present
