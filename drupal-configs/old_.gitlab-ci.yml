stages:
  - deploy
  - cleanup

deploy_preview:
  stage: deploy
  tags:
    - preview-server
  variables:
    PROJECT_NAME: "${CI_PROJECT_NAME}"
    DEPLOY_DIR: "/var/www/previews/${CI_PROJECT_NAME}/mr-${CI_MERGE_REQUEST_IID}"
    DDEV_PROJECT_NAME: "${CI_PROJECT_NAME}-mr-${CI_MERGE_REQUEST_IID}"
    DOMAIN: "mr-${CI_MERGE_REQUEST_IID}-${CI_PROJECT_NAME}.mr.preview-mr.com"
  script:
    - bash scripts/ci/deploy-preview.sh
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  environment:
    name: preview/mr-$CI_MERGE_REQUEST_IID
    url: https://mr-${CI_MERGE_REQUEST_IID}-${CI_PROJECT_NAME}.mr.preview-mr.com

cleanup_closed_mrs:
  stage: cleanup
  tags:
    - preview-server
  script:
    - bash scripts/ci/cleanup-closed-mrs.sh
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
  allow_failure: true
